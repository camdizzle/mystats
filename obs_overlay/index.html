<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <link rel='stylesheet' href='/overlay/styles.css'>
  <title>Overlay</title>
</head>
<body>
  <main class='card'>
    <h1 id='overlay-title'>MyStats Live Results</h1>

    <div class='header-stats'>
      <span id='stat-avg-today' class='pill pill--today'><span class='pill-title'>Avg Points Today</span><span class='pill-value'>0</span></span>
      <span id='stat-uniq-today' class='pill pill--today'><span class='pill-title'>All Racers Today</span><span class='pill-value'>0</span></span>
      <span id='stat-races-today' class='pill pill--today'><span class='pill-title'>Total Races Today</span><span class='pill-value'>0</span></span>
      <span id='stat-avg-season' class='pill pill--season'><span class='pill-title'>Avg Points Season</span><span class='pill-value'>0</span></span>
      <span id='stat-uniq-season' class='pill pill--season'><span class='pill-title'>All Racers Season</span><span class='pill-value'>0</span></span>
      <span id='stat-races-season' class='pill pill--season'><span class='pill-title'>Total Races Season</span><span class='pill-value'>0</span></span>
    </div>

    <section class='board-shell'>
      <ol id='leaderboard'></ol>
    </section>

    <section id='splash-screen' class='splash-screen' aria-hidden='true' visible='false'>
      <div class='splash-screen__image' role='img' aria-label='MyStats splash screen'>
        <div class='splash-screen__title'>MYSTATS</div>
        <div class='splash-screen__presenter'>Presented by CamWOW + Vibblez</div>
        <div class='splash-screen__url'>https://mystats.camwow.tv</div>
        <div class='splash-screen__countdown' aria-hidden='true'><span>3</span><span>2</span><span>1</span></div>
      </div>
    </section>

    <section id='record-overlay' class='record-overlay' aria-hidden='true'>
      <div class='record-overlay__title'>WORLD RECORD!</div>
      <div id='record-overlay-message' class='record-overlay__message'></div>
      <div id='record-overlay-delta' class='record-overlay__delta'></div>
    </section>

    <section id='event-overlay' class='event-overlay' aria-hidden='true'>
      <div id='event-overlay-type' class='event-overlay__type'>EVENT</div>
      <div id='event-overlay-message' class='event-overlay__message'></div>
    </section>

  </main>

  <script src='/overlay/overlay.js'></script>
</body>
</html>
