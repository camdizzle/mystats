<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MyStats Desktop</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <header class="top">
      <h1>MyStats</h1>
      <div class="actions">
        <button id="open-dashboard">Dashboard</button>
        <button id="open-overlay">Overlay</button>
        <button id="open-tilt">Tilt</button>
      </div>
    </header>

    <section class="home-grid">
      <div class="card">
        <h2>Home / Controls</h2>
        <div class="btns">
          <button id="bot-start">Connect Bot</button>
          <button id="bot-stop">Disconnect Bot</button>
        </div>
        <div class="inline">
          <input id="chat-message" placeholder="Send chat message" />
          <button id="bot-say">Send</button>
        </div>
      </div>

      <div class="card">
        <h2>Score Summary</h2>
        <div id="summary" class="summary">Loading…</div>
      </div>
    </section>

    <section class="settings-shell">
      <aside class="tabs" id="tabs"></aside>
      <div class="settings-panel">
        <h2 id="section-title">Settings</h2>
        <div class="fields" id="fields"></div>
        <button id="save-settings">Save Settings</button>
      </div>
    </section>

    <section class="card console">
      <h2>Console</h2>
      <pre id="console"></pre>
    </section>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
